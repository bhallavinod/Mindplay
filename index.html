<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZenSpace Pro | Ambient Sadhana</title>
    <style>
        :root { --blue: #38bdf8; --bg: #020617; --glass: rgba(255, 255, 255, 0.05); }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; height: 100vh; }
        .seal-bg { position: fixed; inset: 0; background: url('pashupati.png') center/cover; opacity: 0.12; filter: sepia(0.5); z-index: -1; }
        .app-shell { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 25px 20px; box-sizing: border-box; }
        
        /* Human Figure */
        .yogeshwar { width: 220px; height: 260px; transition: transform 4s ease-in-out; }
        .inhale { transform: scale(1.1); filter: drop-shadow(0 0 30px var(--blue)); }
        
        #mantraText { font-size: 2.2rem; letter-spacing: 10px; color: var(--blue); text-shadow: 0 0 15px var(--blue); margin: 10px 0; height: 40px; }
        #timer { font-size: 3rem; font-weight: 100; opacity: 0.4; }

        /* Time Selection Grid */
        .time-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; width: 100%; max-width: 320px; }
        .chip { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 12px; border-radius: 15px; font-size: 0.8rem; cursor: pointer; transition: 0.3s; }
        .chip.active { border-color: var(--blue); background: rgba(56, 189, 248, 0.2); }

        .btn-main { background: none; border: 1px solid #fff; color: #fff; padding: 20px; border-radius: 50px; font-weight: bold; width: 100%; max-width: 320px; cursor: pointer; letter-spacing: 3px; transition: 0.4s; }
        .btn-main:active { background: #fff; color: #000; }
    </style>
</head>
<body>
    <div class="seal-bg"></div>
    <div class="app-shell">
        <div style="font-size: 0.7rem; opacity: 0.5; letter-spacing: 2px;">PATIALA RESEARCH UNIT</div>

        <div id="yogeshwar" class="yogeshwar">
            <svg viewBox="0 0 200 250">
                <circle cx="100" cy="45" r="22" fill="none" stroke="white" stroke-width="1"/>
                <text x="100" y="49" fill="white" font-size="10" text-anchor="middle">𐤇</text>
                <path id="lungs" d="M100,80 Q140,80 140,130 Q100,160 60,130 Q60,80 100,80" fill="var(--blue)" fill-opacity="0.2">
                    <animate attributeName="fill-opacity" values="0.2;0.5;0.2" dur="8s" repeatCount="indefinite" />
                </path>
                <path d="M40,210 Q100,180 160,210 Q100,240 40,210" fill="none" stroke="white" stroke-opacity="0.3"/>
            </svg>
        </div>

        <div id="mantraText">READY</div>
        <div id="timer">10:00</div>

        <div class="time-grid">
            <button class="chip active" onclick="setT(10, this)">10m</button>
            <button class="chip" onclick="setT(30, this)">30m</button>
            <button class="chip" onclick="setT(45, this)">45m</button>
            <button class="chip" onclick="setT(60, this)">60m</button>
            <button class="chip" onclick="changeMantra()">MANTRA</button>
            <button class="chip" onclick="toggleRain()">RAIN: OFF</button>
        </div>

        <button class="btn-main" id="masterBtn" onclick="initiate()">BEGIN SADHANA</button>
    </div>

    <script>
        let audioCtx, isPlaying = false, timeLeft = 600, rainNode, mIdx = 0, rainOn = false;
        const mantras = ["SO-HAM", "AUM", "OM NAMAH SHIVAYA"];

        function setT(m, b) {
            if(isPlaying) return;
            timeLeft = m * 60;
            document.getElementById('timer').textContent = m + ":00";
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            b.classList.add('active');
        }

        function changeMantra() {
            mIdx = (mIdx + 1) % mantras.length;
            document.getElementById('mantraText').textContent = mantras[mIdx];
        }

        function toggleRain() {
            rainOn = !rainOn;
            event.target.textContent = rainOn ? "RAIN: ON" : "RAIN: OFF";
            if(isPlaying && rainOn) startRain(); else stopRain();
        }

        async function initiate() {
            if(!isPlaying) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                await audioCtx.resume();
                isPlaying = true;
                document.getElementById('masterBtn').textContent = "STOP SESSION";
                if(rainOn) startRain();
                sadhanaLoop();
                startTimer();
            } else {
                location.reload();
            }
        }

        function sadhanaLoop() {
            if(!isPlaying) return;
            const y = document.getElementById('yogeshwar');
            const m = document.getElementById('mantraText');
            
            // INHALE
            y.classList.add('inhale');
            m.textContent = mantras[mIdx].split('-')[0] || mantras[mIdx];
            speak(m.textContent);
            playTone(80, 0.1, 2); // Breath Air Sound

            setTimeout(() => {
                if(!isPlaying) return;
                // EXHALE
                y.classList.remove('inhale');
                m.textContent = mantras[mIdx].split('-')[1] || mantras[mIdx];
                speak(m.textContent);
                playTone(60, 0.1, 2); // Breath Air Sound
                
                setTimeout(sadhanaLoop, 4000);
            }, 4000);
        }

        function speak(txt) {
            const ut = new SpeechSynthesisUtterance(txt);
            ut.rate = 0.6; ut.pitch = 0.8; ut.volume = 0.5;
            window.speechSynthesis.speak(ut);
        }

        function startRain() {
            const bufferSize = 2 * audioCtx.sampleRate,
            noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate),
            output = noiseBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) { output[i] = Math.random() * 2 - 1; }
            rainNode = audioCtx.createBufferSource();
            rainNode.buffer = noiseBuffer;
            rainNode.loop = true;
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass'; filter.frequency.value = 400;
            const gain = audioCtx.createGain(); gain.gain.value = 0.05;
            rainNode.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
            rainNode.start();
        }

        function stopRain() { if(rainNode) rainNode.stop(); }

        function playTone(f, v, d) {
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.frequency.setValueAtTime(f, audioCtx.currentTime);
            g.gain.linearRampToValueAtTime(v, audioCtx.currentTime + 1);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + d);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + d);
        }

        function startTimer() {
            setInterval(() => {
                if(isPlaying && timeLeft > 0) {
                    timeLeft--;
                    let mins = Math.floor(timeLeft/60), secs = timeLeft%60;
                    document.getElementById('timer').textContent = `${mins}:${secs.toString().padStart(2,'0')}`;
                }
            }, 1000);
        }
    </script>
</body>
</html>
