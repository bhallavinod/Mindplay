<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZenSpace Pro | Resonance Master</title>
    <style>
        :root { --blue: #38bdf8; --bg: #020617; --glass: rgba(255, 255, 255, 0.08); }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; }
        .pashupati { position: fixed; inset: 0; background: url('pashupati.png') center/cover; opacity: 0.1; z-index: -1; }
        
        /* Main Container with Scroll for small screens */
        .app-shell { height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 15px; box-sizing: border-box; overflow-y: auto; }
        
        .yogeshwar { width: 160px; height: 200px; transition: 4s ease-in-out; flex-shrink: 0; }
        .inhale { transform: scale(1.1); filter: drop-shadow(0 0 20px var(--blue)); }
        
        #mantraDisplay { font-size: 1.8rem; letter-spacing: 12px; color: var(--blue); margin: 10px 0; min-height: 35px; text-shadow: 0 0 10px var(--blue); }
        #timer { font-size: 2.2rem; font-weight: 100; opacity: 0.5; }

        .control-panel { width: 100%; max-width: 340px; display: flex; flex-direction: column; gap: 10px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        
        .chip { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 8px; border-radius: 10px; font-size: 0.7rem; cursor: pointer; }
        .chip.active { border-color: var(--blue); background: rgba(56, 189, 248, 0.2); }

        .btn-main { background: none; border: 1px solid #fff; color: #fff; padding: 16px; border-radius: 50px; font-weight: bold; cursor: pointer; letter-spacing: 2px; margin-top: 10px; }

        .maps-row { display: flex; justify-content: space-around; width: 100%; margin-top: 15px; background: var(--glass); padding: 10px; border-radius: 15px; }
        .seat-map { width: 45px; height: 45px; border: 1px solid rgba(255,255,255,0.2); border-radius: 50%; position: relative; }
        #dot { width: 6px; height: 6px; background: var(--blue); border-radius: 50%; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); }
        
        .heatmap { display: grid; grid-template-columns: repeat(10, 1fr); gap: 3px; }
        .sq { width: 10px; height: 10px; background: rgba(255,255,255,0.1); border-radius: 2px; }
        .sq.active { background: var(--blue); }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        .modal-box { background: #0f172a; padding: 25px; border-radius: 25px; border: 1px solid var(--blue); width: 100%; max-width: 300px; text-align: center; }
        input { background: none; border: 1px solid var(--blue); color: #fff; padding: 10px; width: 60px; text-align: center; margin: 5px; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="pashupati"></div>
    <div class="app-shell">
        <div id="yogeshwar" class="yogeshwar">
            <svg viewBox="0 0 200 250">
                <circle cx="100" cy="45" r="22" fill="none" stroke="white" stroke-width="0.8"/>
                <text x="100" y="49" fill="white" font-size="10" text-anchor="middle">𐤇</text>
                <path d="M100,80 Q140,80 140,130 Q100,160 60,130 Q60,80 100,80" fill="var(--blue)" fill-opacity="0.2"/>
            </svg>
        </div>

        <div id="mantraDisplay">OM</div>
        <div id="timer">10:00</div>

        <div class="control-panel">
            <div class="grid">
                <button class="chip active" onclick="setM(10, this)">10m</button>
                <button class="chip" onclick="setM(30, this)">30m</button>
                <button class="chip" onclick="setM(60, this)">60m</button>
            </div>
            <div class="grid">
                <button class="chip active" onclick="chM('OM', this)">OM</button>
                <button class="chip" onclick="chM('SO-HAM', this)">SO-HAM</button>
                <button class="chip" onclick="chM('AUM', this)">AUM</button>
            </div>
            <div class="grid" id="ambients">
                <button class="chip" onclick="tglA('rain', this)">Rain</button>
                <button class="chip" onclick="tglA('wind', this)">Wind</button>
                <button class="chip" onclick="tglA('forest', this)">Forest</button>
            </div>
            <button class="btn-main" id="btn" onclick="start()">BEGIN SADHANA</button>
        </div>

        <div class="maps-row">
            <div class="seat-map"><div id="dot"></div></div>
            <div id="heatmap" class="heatmap"></div>
        </div>
    </div>

    <div id="vModal" class="modal">
        <div class="modal-box">
            <h3>Vigilance Verify</h3>
            <p style="font-size:0.7rem">Count bells heard:</p>
            <div>Low: <input type="number" id="inL"></div>
            <div>Med: <input type="number" id="inM"></div>
            <div>High: <input type="number" id="inH"></div>
            <button class="btn-main" onclick="finish()">SUBMIT</button>
        </div>
    </div>

    <script>
        let audioCtx, isPlaying = false, timeLeft = 600, scores = [], startTime = 0;
        let c = { low: 0, med: 0, high: 0 }, mantra = 'OM', activeA = {};

        // Heatmap Init
        const hm = document.getElementById('heatmap');
        for(let i=0; i<30; i++) {
            let s = document.createElement('div');
            s.className = 'sq' + (i > 25 ? ' active' : '');
            hm.appendChild(s);
        }

        function setM(m, b) { if(!isPlaying) { timeLeft = m*60; document.getElementById('timer').textContent = m+":00"; toggle(b); } }
        function chM(m, b) { mantra = m; document.getElementById('mantraDisplay').textContent = m; toggle(b); }
        function toggle(b) { b.parentElement.querySelectorAll('.chip').forEach(c => c.classList.remove('active')); b.classList.add('active'); }
        function tglA(t, b) { activeA[t] = !activeA[t]; b.classList.toggle('active'); }

        async function start() {
            if(!isPlaying) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                isPlaying = true; startTime = Date.now();
                document.getElementById('btn').textContent = "FINISH";
                initSensors(); run();
                ['low','med','high'].forEach(t => {
                    let n = Math.floor(Math.random()*3)+2; c[t] = n;
                    for(let i=0; i<n; i++) setTimeout(() => { if(isPlaying) bell(t); }, Math.random()*(timeLeft-30)*1000 + 15000);
                });
            } else { document.getElementById('vModal').style.display = 'flex'; }
        }

        function run() {
            if(!isPlaying) return;
            const y = document.getElementById('yogeshwar');
            y.classList.add('inhale');
            echo(mantra);
            
            setTimeout(() => {
                if(!isPlaying) return;
                y.classList.remove('inhale');
                let elapsed = (Date.now() - startTime) / 1000;
                if(elapsed > 300) { // After 5 mins
                    let s = getS();
                    if(s > 0.98) reward('conch');
                    else if(s > 0.94) reward('flute');
                    else reward('drum');
                }
                setTimeout(run, 4000);
            }, 4000);
            updateTimer();
        }

        function echo(txt) {
            const u = new SpeechSynthesisUtterance(txt);
            u.rate = 0.4; u.pitch = 0.3; u.volume = 0.4;
            window.speechSynthesis.speak(u);
            // Simulate Echo with AudioContext
            let o = audioCtx.createOscillator();
            let g = audioCtx.createGain();
            o.frequency.value = 110; g.gain.value = 0.05;
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + 3);
        }

        function bell(t) {
            let f = t==='low'?220 : t==='med'?440 : 880;
            tone(f, 0.3, 2, 'sine');
        }

        function reward(type) {
            if(type==='conch') tone(330, 0.2, 4, 'sawtooth');
            if(type==='flute') tone(554, 0.1, 2, 'triangle');
            if(type==='drum') tone(60, 0.5, 0.5, 'sine');
        }

        function tone(f, v, d, w) {
            let o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = w; o.frequency.value = f;
            g.gain.setValueAtTime(v, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + d);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + d);
        }

        function initSensors() {
            window.addEventListener('devicemotion', (e) => {
                let x = e.accelerationIncludingGravity.x||0, y = e.accelerationIncludingGravity.y||0;
                document.getElementById('dot').style.left = (50+(x*4))+'%';
                document.getElementById('dot').style.top = (50+(y*4))+'%';
                scores.push(Math.max(0, 1-(Math.sqrt(x*x+y*y)/20)));
            });
        }

        function getS() { return scores.length ? scores.reduce((a,b)=>a+b)/scores.length : 0; }

        function updateTimer() {
            if(isPlaying && timeLeft > 0) {
                timeLeft--;
                let m = Math.floor(timeLeft/60), s = timeLeft%60;
                document.getElementById('timer').textContent = `${m}:${s.toString().padStart(2,'0')}`;
                setTimeout(updateTimer, 1000);
            }
        }

        function finish() {
            alert("Sadhana Complete. Accuracy Checked. Patiala Unit Records Updated.");
            location.reload();
        }
    </script>
</body>
</html>
